<!DOCTYPE html>
<html>
<head>
<title>Birthday Queen 👑</title>
<style>
body {
    margin:0;
    padding:0;
    background: linear-gradient(135deg, hotpink, purple);
    text-align:center;
    font-family: Arial, sans-serif;
    color:white;
    overflow:hidden;
}
h1 {
    margin-top:150px;
    font-size:50px;
}
button {
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    background:white;
    color:purple;
    font-weight:bold;
}
canvas {
    position:fixed;
    top:0;
    left:0;
}
</style>
</head>

<body>

<h1>🎉 HAPPY BIRTHDAY SPORTING QUEEN 🎉</h1>
<p>Main Character Energy: MAX 🔥</p>
<button onclick="startParty()">Start Birthday Mode 🎊</button>

<canvas id="confetti"></canvas>

<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
function startParty(){
    document.getElementById("music").play();
    alert("Of course you clicked. Iconic behavior 👑🔥");
    confettiEffect();
}

function confettiEffect(){
    const canvas = document.getElementById("confetti");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let pieces = [];
    for(let i=0;i<200;i++){
        pieces.push({
            x:Math.random()*canvas.width,
            y:Math.random()*canvas.height,
            size:Math.random()*8,
            speed:Math.random()*3+2
        });
    }

    function draw(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle="white";
        pieces.forEach(p=>{
            ctx.fillRect(p.x,p.y,p.size,p.size);
            p.y+=p.speed;
            if(p.y>canvas.height) p.y=0;
        });
        requestAnimationFrame(draw);
    }
    draw();
}
</script>

</body>
</html>
